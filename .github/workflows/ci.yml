name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run pytest -m 'not hardware'
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
